:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 5) %>
:timeout: 25
:queues:
  - [critical, 6]
  - [default, 4]
  - [mailers, 3]
  - [integrations, 3]
  - [low, 1]
:max_retries: 10
:scheduler:
  :schedule:
    email_dispatch:
      every: '1s'
      class: Mailers::DispatchBatchJob
      queue: mailers
      description: "Drain the centralized email outbox every 1 second (25 emails/sec)"
