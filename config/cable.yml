development:
  adapter: <%= ENV.fetch("REDIS_URL", nil) ? "redis" : "async" %>
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: code_nest_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV["REDIS_URL"] %>
  channel_prefix: code_nest_production
